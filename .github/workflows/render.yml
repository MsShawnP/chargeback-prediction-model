name: Render Quarto reports and deploy to GitHub Pages

# Renders all three Quarto reports from the frames already committed at
# output/frames/*.csv and deploys the resulting _site to GitHub Pages.
# Postgres is only reachable via Fly.io private networking, which CI
# runners can't reach -- the pipeline (run_pipeline.py) must be run
# locally against a live DB and its output/frames/*.csv committed
# before pushing. This workflow does not touch the database.

on:
  push:
    branches: [main]
    paths:
      - "quarto/**"
      - "output/frames/*.csv"
      - ".github/workflows/render.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  render:
    name: Render
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install Python dependencies for Quarto rendering
        # Only the packages the .qmd Python cells import are needed here
        # (pandas, plotly, pyyaml, the Jupyter engine) -- not the full
        # pipeline stack (psycopg2, scikit-learn, shap), since the
        # pipeline itself does not run in CI.
        run: pip install pandas pyarrow plotly kaleido pyyaml jupyter nbformat nbclient ipykernel

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          tinytex: true

      - name: Install LaTeX packages for PDF tearsheet
        run: |
          quarto install tinytex --no-prompt || true
          tlmgr install scrlayer-scrpage koma-script booktabs colortbl array \
            xcolor enumitem parskip longtable multirow caption etoolbox || true

      - name: Render Quarto reports
        run: quarto render quarto/
        env:
          QUARTO_PYTHON: python

      - name: Upload pipeline artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-outputs
          path: |
            output/frames/prevention_roadmap.csv
            output/frames/historical_chargebacks_by_archetype.csv
            output/frames/model_performance.csv
          retention-days: 30
          if-no-files-found: warn

      - name: Assemble Pages site
        if: success() && github.ref == 'refs/heads/main'
        run: |
          mkdir -p _site
          cp -r quarto/_site/. _site/
          touch _site/.nojekyll

      - name: Upload Pages artifact
        if: success() && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Pipeline summary
        if: success()
        run: |
          echo '## Render summary' >> "$GITHUB_STEP_SUMMARY"
          echo '' >> "$GITHUB_STEP_SUMMARY"
          echo '| Report | Path |' >> "$GITHUB_STEP_SUMMARY"
          echo '|---|---|' >> "$GITHUB_STEP_SUMMARY"
          for f in quarto/_site/prevention_roadmap.html quarto/_site/tearsheet.html quarto/_site/methodology.html; do
            if [ -f "$f" ]; then
              echo "| \`$(basename $f)\` | \`$f\` |" >> "$GITHUB_STEP_SUMMARY"
            fi
          done

  deploy:
    name: Deploy to GitHub Pages
    needs: render
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
