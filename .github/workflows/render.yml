name: Render Quarto reports and deploy to GitHub Pages

# Runs the full Python pipeline, renders all three Quarto reports, and
# deploys the resulting _site to GitHub Pages. DATABASE_URL must be set
# as a repository secret pointing to the Cinderhaven Postgres instance
# (via flyctl proxy or Fly.io private networking).

on:
  push:
    branches: [main]
    paths:
      - "quarto/**"
      - "src/**"
      - "run_pipeline.py"
      - "requirements.txt"
      - ".github/workflows/render.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  render:
    name: Pipeline + render
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          tinytex: true

      - name: Install LaTeX packages for PDF tearsheet
        run: |
          quarto install tinytex --no-prompt || true
          tlmgr install scrlayer-scrpage koma-script booktabs colortbl array \
            xcolor enumitem parskip longtable multirow caption etoolbox || true

      - name: Run pipeline
        run: python run_pipeline.py
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Render Quarto reports
        run: quarto render quarto/
        env:
          QUARTO_PYTHON: python

      - name: Upload pipeline artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-outputs
          path: |
            output/frames/prevention_roadmap.csv
            output/frames/historical_chargebacks_by_archetype.csv
            output/frames/model_performance.csv
          retention-days: 30
          if-no-files-found: warn

      - name: Assemble Pages site
        if: success() && github.ref == 'refs/heads/main'
        run: |
          mkdir -p _site
          cp -r quarto/_site/. _site/
          touch _site/.nojekyll

      - name: Upload Pages artifact
        if: success() && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Pipeline summary
        if: success()
        run: |
          echo '## Render summary' >> "$GITHUB_STEP_SUMMARY"
          echo '' >> "$GITHUB_STEP_SUMMARY"
          echo '| Report | Path |' >> "$GITHUB_STEP_SUMMARY"
          echo '|---|---|' >> "$GITHUB_STEP_SUMMARY"
          for f in quarto/_site/prevention_roadmap.html quarto/_site/tearsheet.html quarto/_site/methodology.html; do
            if [ -f "$f" ]; then
              echo "| \`$(basename $f)\` | \`$f\` |" >> "$GITHUB_STEP_SUMMARY"
            fi
          done

  deploy:
    name: Deploy to GitHub Pages
    needs: render
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
